name: Build Windows EXE

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (optimized)
        run: |
          python -m pip install --upgrade pip

          # Install most requirements normally
          python -m pip install -r requirements.txt

          # Swap full OpenCV for headless (saves ~50 MB)
          python -m pip uninstall opencv-python -y
          python -m pip install opencv-python-headless>=4.9.0

          # Ensure resemblyzer doesn't pull in torch
          python -m pip install --no-deps resemblyzer>=0.1.4

          # Build tools
          python -m pip install pyinstaller

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Build executable
        run: pyinstaller "Kree AI.spec"

      - name: Build release bundle
        run: python build_release.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kree-AI-Windows
          path: |
            dist/Kree AI/**
            dist/release/**
